<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script
      defer
      src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"
    ></script>
    <script
      defer
      src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"
    ></script>
    <script defer src="formHandler.js"></script>
    <link rel="stylesheet" href="form.css" />
  </head>

  <body>
    <div class="form-container">
      <header class="form-header">
        <img src="rural.png" />
        <h1>Student Parking Permit Application</h1>
        <p>Please fill out the form below to request a parking space.</p>
      </header>

      <form id="parkingForm">
        <!-- Full Name -->
        <div class="form-group">
          <label for="fullname"
            >Full Name <span class="required">*</span></label
          >
          <input
            type="text"
            id="fullname"
            name="fullname"
            placeholder="John Doe"
            required
          />
        </div>

        <!-- Lot Selection -->
        <div class="form-group">
          <label for="grade">Grade<span class="required">*</span></label>
          <select id="grade" name="grade" required>
            <option value="" disabled selected>Select a grade</option>
            <option value="12">12</option>
            <option value="11">11</option>
            <option value="10">10</option>
          </select>
        </div>

        <!-- email -->
        <div class="form-group">
          <label for="email"
            >School email <span class="required">*</span></label
          >
          <input
            type="email"
            id="email"
            name="email"
            placeholder="examle@cloud.edu.pe.ca"
            required
          />
        </div>

        <!-- Example of an Error State -->
        <div class="form-group">
          <label for="phone">Phone Number </label>
          <input
            type="tel"
            id="phone"
            name="phone"
            placeholder="optional (for open spot comunication)"
            
          />
        </div>

        <!-- average -->
        <div class="form-group">
          <label for="average"
            >Academic average to date <span class="required">*</span></label
          >
          <input
            type="text"
            id="average"
            name="average"
            placeholder="eg. 82"
            required
          />
        </div>

        <!-- attendance -->
        <div class="form-group">
          <label for="attendance"
            >Unapproved absences to date (periods)<span class="required"
              >*</span
            ></label
          >
          <input
            type="text"
            id="attendance"
            name="attendance"
            placeholder="eg. 12"
            required
          />
        </div>

        <!-- Vehicle Info Group -->
        <div class="form-row">
          <div class="form-group">
            <label for="plate"
              >License Plate <span class="required">*</span></label
            >
            <input
              type="text"
              id="plate"
              name="plate"
              placeholder="ABC-123"
              required
            />
          </div>
          <div class="form-group">
            <label for="make"
              >Vehicle Make/Model <span class="required">*</span></label
            >
            <input
              type="text"
              id="make"
              name="make"
              placeholder="Toyota Camry"
              required
            />
          </div>
        </div>

        <!-- Lot Selection -->
        <div class="form-group">
          <label for="time"
            >time required <span class="required">*</span></label
          >
          <select id="time" name="time" required>
            <option value="" disabled selected>Select a time</option>
            <option value="full_day">Full Day</option>
            <option value="am">Morning (AM)</option>
            <option value="pm">Afternoon (PM)</option>
          </select>
        </div>

        <!-- Form Actions -->
        <div class="form-actions">
                  <button id="home" class="btn btn-secondary" onclick="location.href='../index.html'">Home</button>
          <button type="reset" class="btn btn-secondary">Cancel</button>
          <button type="submit" class="btn btn-primary">
            Submit Application
          </button>
        </div>
      </form>
    </div>
  </body>
</html>
