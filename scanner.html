<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plate Scanner</title>
    <script
      defer
      src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"
    ></script>
    <script
      defer
      src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"
    ></script>

    <script src="https://js.puter.com/v2/"></script>
    <script defer src="scannerHandler.js"></script>
    <link rel="stylesheet" href="scanner.css" />
  </head>
  <body>
    <div class="admin-container scanner-container">
      <header class="admin-header">
        <div class="whole-header">
          <div>
            <h1>Plate Enforcement Scanner</h1>
            <p>Scan a vehicle's license plate to verify active parking privileges.</p>
          </div>
          <div class="header-buttons">
            <button id="processBtn" class="btn btn-secondary" onclick="location.href='admin/index.html'">Back</button>
          </div>
        </div>
      </header>

      <div class="camera-card">
        <div class="video-container" id="videoContainer">
          <video id="cameraStream" autoplay playsinline muted></video>
          <canvas id="captureCanvas" class="hidden"></canvas>

          <div class="scanner-overlay" id="scannerOverlay">
            <div class="target-box" id="targetBox"></div>
          </div>

          <button id="scanBtn" class="btn btn-primary overlay-btn">
            Scan Plate
          </button>
        </div>
      </div>

      <div id="resultCard" class="result-card hidden">
        <div class="result-header">
          <span class="stat-label">Detected Text</span>
          <h2 id="detectedPlate">—</h2>
        </div>
        <div id="matchStatus" class="match-badge">Checking Database...</div>
        <div id="matchDetails" class="match-details"></div>
      </div>

      <div id="statusMsg" class="status-msg"></div>
    </div>
  </body>
</html>
