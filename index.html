<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Parking Lot Map</title>
    <script
      defer
      src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"
    ></script>
    <script
      defer
      src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"
    ></script>
    <script defer src="renderer.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
        background-color: #1e1e24;
        color: #f5f5f7;
        margin: 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      h1 {
        margin-bottom: 10px;
        font-size: 1.5rem;
        font-weight: 600;
      }
      .controls {
        margin-bottom: 20px;
        font-size: 0.95rem;
        color: #a1a1a6;
      }
      .canvas-container {
        background-color: #2a2a32;
        padding: 15px;
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        display: flex;
        justify-content: center;
        align-items: center;
      }
      canvas {
        display: block;
        background-color: #3a3a44; /* Fallback background for the road/lot surface */
        border-radius: 6px;
        cursor: pointer;
        touch-action: none;
      }

      button {
        background-color: #212529; /* Dark charcoal */
        color: #ffffff;
        padding: 10px 20px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        transition: background-color 0.3s ease;
        margin-bottom: 12px;
        border: #f5f5f7 2px solid;
      }

      a {
        font-weight: bold;
        color: #ffffff;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <h1>Parking Lot Overview</h1>
    <div class="controls" id="status-display">Drag and scroll to view.</div>

    <button><a href="form/index.html">Apply For a Spot</a></button>

    <div class="canvas-container">
      <canvas id="parkingCanvas" width="800" height="500"></canvas>
    </div>
  </body>
</html>
