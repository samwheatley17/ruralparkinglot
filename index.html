<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Parking Lot Map</title>
    <script defer src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <script defer src="renderer.js"></script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }
 
      body {
        background-color: #F9F9F9;
        color: #1A1A1A;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
        gap: 0;
      }
 
      .page-wrapper {
        width: 100%;
        max-width: 860px;
        display: flex;
        flex-direction: column;
        gap: 24px;
      }
 
      /* Header */
      .site-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        padding-bottom: 20px;
        border-bottom: 2px solid #1A1A1A;
      }
 
      .site-title {
        border-left: 5px solid #D32F2F;
        padding-left: 15px;
      }
 
      .site-title h1 {
        font-size: 22px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 4px;
      }
 
      .site-title p {
        font-size: 13px;
        color: #666666;
      }
 
      .header-buttons {
        display: flex;
        gap: 10px;
      }
 
      /* Buttons */
      .btn {
        padding: 12px 22px;
        font-size: 13px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        cursor: pointer;
        border-radius: 0;
        transition: all 0.2s ease;
        text-decoration: none;
        display: inline-block;
      }
 
      .btn-primary {
        background-color: #D32F2F;
        color: #FFFFFF;
        border: 2px solid #D32F2F;
      }
      .btn-primary:hover {
        background-color: #1A1A1A;
        border-color: #1A1A1A;
      }
 
      .btn-secondary {
        background-color: #FFFFFF;
        color: #1A1A1A;
        border: 2px solid #1A1A1A;
      }
      .btn-secondary:hover {
        background-color: #1A1A1A;
        color: #FFFFFF;
      }
 
      /* Status bar */
      .status-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 14px;
        background-color: #FFFFFF;
        border: 1.5px solid #1A1A1A;
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: #666666;
      }
 
      .status-dot {
        width: 8px;
        height: 8px;
        background-color: #2E7D32;
        border-radius: 50%;
        display: inline-block;
        margin-right: 6px;
      }
 
      /* Canvas container */
      .canvas-container {
        background-color: #FFFFFF;
        border: 2px solid #1A1A1A;
        box-shadow: 6px 6px 0px #1A1A1A;
        padding: 12px;
        display: flex;
        justify-content: center;
        align-items: center;
      }
 
      canvas {
        display: block;
        background-color: #3a3a44;
        cursor: pointer;
        touch-action: none;
      }
    </style>
  </head>
  <body>
    <div class="page-wrapper">
 
      <header class="site-header">
        <div class="site-title">
          <h1>Parking Lot Overview</h1>
          <p>Rural Parking Lot — Spot Management System</p>
        </div>
        <div class="header-buttons">
          <a href="form/index.html" class="btn btn-primary">Apply For a Spot</a>
          <a href="pin.html" class="btn btn-secondary">Admin</a>
        </div>
      </header>
 
      <div class="status-bar">
        <span><span class="status-dot"></span><span id="status-display">Drag and scroll to view.</span></span>
        <span>Live</span>
      </div>
 
      <div class="canvas-container">
        <canvas id="parkingCanvas" width="800" height="500"></canvas>
      </div>
 
    </div>
  </body>
</html>
